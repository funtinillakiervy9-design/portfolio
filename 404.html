<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | Jonh Kiervy Funtinilla</title>
  <meta name="theme-color" content="#020617" />
  <link rel="icon" type="image/svg+xml" href="public/icons/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&family=Sora:wght@500;600;700&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg: #020617;
      --surface: #0d0e12;
      --text: #f4f5f7;
      --muted: #b0b4be;
      --brand: #2563eb;
      --accent: #7dd3fc;
      --line: #252833;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Manrope", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 22%, rgba(37, 99, 235, 0.24), transparent 38%),
        radial-gradient(circle at 78% 88%, rgba(125, 211, 252, 0.12), transparent 34%),
        var(--bg);
      padding: 1.1rem;
    }

    .card {
      width: min(640px, 94vw);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
      box-shadow: 0 22px 46px rgba(0, 0, 0, 0.4);
      padding: 2.1rem 1.5rem;
      text-align: center;
    }

    .code {
      color: var(--accent);
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.8rem;
    }

    h1 {
      margin: 0.55rem 0 0.7rem;
      font-family: "Sora", sans-serif;
      font-size: clamp(1.6rem, 5vw, 2.6rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
    }

    p {
      margin: 0 auto;
      max-width: 48ch;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
    }

    .actions {
      margin-top: 1.3rem;
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 0.72rem 1.2rem;
      font-weight: 700;
      text-decoration: none;
      border: 1px solid transparent;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(120deg, #2563eb 0%, #1d4ed8 100%);
      color: #fff;
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.35);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 25px rgba(37, 99, 235, 0.45);
    }

    .btn-secondary {
      background: transparent;
      border-color: var(--line);
      color: var(--text);
    }

    .btn-secondary:hover {
      transform: translateY(-2px);
      border-color: var(--brand);
      background: rgba(37, 99, 235, 0.16);
    }
  </style>
</head>
<body>
  <main class="card" role="main">
    <p class="code">404 Error</p>
    <h1>This page is not available.</h1>
    <p>
      The page may have been moved, renamed, or never existed. You can return to your portfolio home
      or jump directly to your projects section.
    </p>
    <div class="actions">
      <a class="btn btn-primary" href="./index.html">Back to Home</a>
      <a class="btn btn-secondary" href="./index.html#projects">View Projects</a>
    </div>
  </main>
</body>
</html>
